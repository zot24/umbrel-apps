name: "Build: Hermes Agent"

on:
  push:
    branches: [main]
    paths:
      - 'zot24-hermes/web/Dockerfile'
      - 'zot24-hermes/web/entrypoint.sh'
  workflow_dispatch:
    inputs:
      hermes_version:
        description: 'Hermes version to build (e.g. v2026.3.23). Leave empty to read from VERSION file.'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      hermes_version:
        description: 'Hermes version to build (e.g. v2026.3.23). Leave empty to read from VERSION file.'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.hermes_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(cat zot24-hermes/VERSION | tr -d '[:space:]')
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi

          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: zot24-hermes/web
          file: zot24-hermes/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            HERMES_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/zot24/hermes-docker:${{ steps.version.outputs.version }}
            ghcr.io/zot24/hermes-docker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update docker-compose.yml with new image + digest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          sed -i "s|image: ghcr.io/zot24/hermes-docker:.*|image: ghcr.io/zot24/hermes-docker:${VERSION}@${DIGEST}|" zot24-hermes/docker-compose.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zot24-hermes/docker-compose.yml
          git diff --cached --quiet || git commit -m "chore: update web image to ${{ steps.version.outputs.version }}"
          # Retry with rebase in case remote moved during the build
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done

      # Bump umbrel-app.yml version so Umbrel shows "Update available" for installs.
      # Skipped when called from watch-hermes (it already sets the version to the
      # upstream Hermes semver) or when a specific hermes_version was dispatched.
      # Separate commit + retry loop so a parallel build-setup bump doesn't conflict.
      - name: Bump umbrel-app version (patch)
        if: inputs.hermes_version == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SUCCESS=0
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            CURRENT=$(grep -E '^version: ' zot24-hermes/umbrel-app.yml | sed -E 's/^version: *"([^"]+)".*/\1/')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
            sed -i "s|^version: \".*\"|version: \"$NEW\"|" zot24-hermes/umbrel-app.yml
            # Keep APP_VERSION in docker-compose.yml in sync — the setup UI reads it.
            sed -i "s|APP_VERSION: v.*|APP_VERSION: v$NEW|" zot24-hermes/docker-compose.yml
            git add zot24-hermes/umbrel-app.yml zot24-hermes/docker-compose.yml
            if git diff --cached --quiet; then
              echo "Nothing to bump (manifest already at latest)"
              SUCCESS=1
              break
            fi
            git commit -m "chore: bump umbrel-app version to $NEW"
            if git push; then
              echo "Bumped to $NEW"
              SUCCESS=1
              break
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          if [ "$SUCCESS" = "0" ]; then
            echo "::warning::Version bump did not land after 5 attempts. Bump umbrel-app.yml manually."
          fi
