name: Build Web Image

on:
  push:
    branches: [main]
    paths:
      - 'zot24-hermes/web/Dockerfile'
      - 'zot24-hermes/web/entrypoint.sh'
      - 'zot24-hermes/VERSION'
  workflow_dispatch:
    inputs:
      hermes_version:
        description: 'Hermes version to build (e.g. v2026.3.23). Leave empty to read from VERSION file.'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      hermes_version:
        description: 'Hermes version to build (e.g. v2026.3.23). Leave empty to read from VERSION file.'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.hermes_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(cat zot24-hermes/VERSION | tr -d '[:space:]')
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi

          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: zot24-hermes/web
          file: zot24-hermes/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            HERMES_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/zot24/hermes-docker:${{ steps.version.outputs.version }}
            ghcr.io/zot24/hermes-docker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update docker-compose.yml with new image + digest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          sed -i "s|image: ghcr.io/zot24/hermes-docker:.*|image: ghcr.io/zot24/hermes-docker:${VERSION}@${DIGEST}|" zot24-hermes/docker-compose.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zot24-hermes/docker-compose.yml
          git diff --cached --quiet || git commit -m "chore: update web image to ${{ steps.version.outputs.version }}"
          # Retry with rebase in case remote moved during the build
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
