name: Watch Hermes Agent Releases

on:
  schedule:
    - cron: '30 0 * * *'  # Daily at 00:30 UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  actions: read

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Get latest hermes-agent version
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Improved gh fetch with explicit error handling and timeout
          set -euo pipefail
          LATEST=$(gh release view -R NousResearch/hermes-agent --json tagName -q .tagName 2>&1) || {
            echo "::error::Failed to fetch latest release from hermes-agent: $LATEST"
            exit 1
          }

          if [ -z "$LATEST" ]; then
            echo "::error::Failed to fetch latest release from hermes-agent"
            exit 1
          fi

          echo "Latest hermes-agent version: $LATEST"
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Checkout umbrel-apps
        uses: actions/checkout@v4

      - name: Check current version
        id: check
        run: |
          LATEST="${{ steps.fetch.outputs.version }}"

          # Validate version format (must be vYYYY.M.D or vYYYY.M.D.N for date tags)
          if ! echo "$LATEST" | grep -qE '^v[0-9]{4}\.[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::Invalid version format: $LATEST"
            exit 1
          fi

          # Get current version from VERSION file
          CURRENT=$(cat zot24-hermes/VERSION 2>/dev/null | tr -d '[:space:]')
          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date"
            echo "new_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version available: $LATEST"
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

  # Build the Docker image FIRST — version files are only updated on success
  build-web:
    needs: check-release
    if: needs.check-release.outputs.new_release == 'true'
    uses: ./.github/workflows/build-web.yml
    with:
      hermes_version: ${{ needs.check-release.outputs.version }}
    permissions:
      contents: write
      packages: write

  # Only commit version bump after a successful build to avoid race conditions
  update-version:
    needs: [check-release, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout umbrel-apps
        uses: actions/checkout@v4

      - name: Fetch release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"

          # Final validation before making changes
          if [ -z "$VERSION" ] || ! echo "$VERSION" | grep -qE '^v[0-9]{4}\.[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::Invalid or empty version: $VERSION"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Extract semver from release name (e.g. "Hermes Agent v0.15.2 (2026.5.29.2)" → "0.15.2")
          RELEASE_NAME=$(gh release view "$VERSION" -R NousResearch/hermes-agent --json name -q .name)
          SEMVER=$(echo "$RELEASE_NAME" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//')
          if [ -z "$SEMVER" ]; then
            echo "::warning::Could not extract semver from '$RELEASE_NAME', using date version"
            SEMVER="${VERSION#v}"
          fi
          echo "Semver: $SEMVER"
          echo "SEMVER=$SEMVER" >> $GITHUB_ENV

          # Extract release summary: prefer blockquote summary, fall back to generic
          BODY=$(gh release view "$VERSION" -R NousResearch/hermes-agent --json body -q .body)
          NOTES=$(echo "$BODY" | grep '^> ' | head -1 | sed 's/^> //' | head -c 500)
          if [ -z "$NOTES" ]; then
            NOTES="Updated to ${VERSION}."
          fi
          # Write to file to avoid shell escaping issues
          echo "$NOTES" > /tmp/release_notes.txt
          echo "Release notes: $NOTES"

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Update VERSION file, umbrel-app.yml and docker-compose.yml with PyYAML
        run: |
          python3 -c "
          import os
          import yaml

          semver = os.environ['SEMVER']
          version = os.environ['VERSION']
          with open('/tmp/release_notes.txt') as f:
              notes = f.read().strip()

          # Update umbrel-app.yml using PyYAML for robustness
          path = 'zot24-hermes/umbrel-app.yml'
          with open(path) as f:
              data = yaml.safe_load(f)

          data['version'] = semver
          if 'releaseNotes' in data:
              data['releaseNotes'] = notes
          else:
              data['releaseNotes'] = notes

          with open(path, 'w') as f:
              yaml.safe_dump(data, f, default_flow_style=False, sort_keys=False, width=1000)

          # Update APP_VERSION in docker-compose.yml (still use regex for env line as it's not full YAML structure)
          dc_path = 'zot24-hermes/docker-compose.yml'
          with open(dc_path) as f:
              dc = f.read()
          import re
          dc = re.sub(r'APP_VERSION: v.*', f'APP_VERSION: v{semver}', dc)
          with open(dc_path, 'w') as f:
              f.write(dc)

          print('Updated files with PyYAML')
          "

      - name: Verify changes
        run: |
          echo "=== VERSION ==="
          cat zot24-hermes/VERSION
          echo ""
          echo "=== umbrel-app.yml ==="
          grep -E "^version:|releaseNotes:" zot24-hermes/umbrel-app.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zot24-hermes/VERSION zot24-hermes/umbrel-app.yml zot24-hermes/docker-compose.yml
          git diff --cached --quiet || git commit -m "chore: update Hermes Agent to ${{ env.VERSION }}"
          # Pull with rebase in case build-web pushed during the build
          git pull --rebase origin main
          git push
