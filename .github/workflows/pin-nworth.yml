name: Pin nworth image

# The nworth image is built + published by the nworth repo itself
# (zot24/nworth -> .github/workflows/publish-image.yml), so this store never
# needs the private source. This workflow tracks the ghcr.io/zot24/nworth
# package: find the highest semver tag, resolve its manifest digest, and pin
# docker-compose.yml + bump the app version so Umbrel surfaces the update.
#
# The package is kept PRIVATE (the app embeds business-entity names in
# migration/template comments), so tag/digest reads authenticate with the
# GHCR_READ_TOKEN secret — a classic PAT scoped to read:packages ONLY (it can
# pull images, never see code/issues). The same PAT is used once on the Umbrel
# box for `docker login ghcr.io`. If the secret is absent, falls back to an
# anonymous token (works only if the package is public).

on:
  schedule:
    - cron: '45 1 * * *'  # Daily at 01:45 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest published version + digest
        id: img
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          set -euo pipefail
          REPO=zot24/nworth
          # Private package: exchange the read:packages PAT for a registry
          # token via basic auth. Public fallback: anonymous token.
          if [ -n "${GHCR_READ_TOKEN:-}" ]; then
            TOKEN=$(curl -fsSL -u "zot24:${GHCR_READ_TOKEN}" \
              "https://ghcr.io/token?scope=repository:${REPO}:pull&service=ghcr.io" \
              | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])')
          else
            TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:${REPO}:pull&service=ghcr.io" \
              | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])')
          fi
          TAGS=$(curl -fsSL -H "Authorization: Bearer $TOKEN" "https://ghcr.io/v2/${REPO}/tags/list")
          VER=$(printf '%s' "$TAGS" | python3 -c '
          import sys,json,re
          t=json.load(sys.stdin).get("tags",[])
          v=[x for x in t if re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+",x)]
          v.sort(key=lambda s:list(map(int,s.split("."))))
          print(v[-1] if v else "")')
          if [ -z "$VER" ]; then
            echo "::error::No semver tags visible on ghcr.io/${REPO} — is the image built, and (if private) is GHCR_READ_TOKEN set with read:packages?"
            exit 1
          fi
          # Multi-arch manifest-list (index) digest, so Umbrel pulls the right arch.
          DIGEST=$(curl -fsSL -I -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/${REPO}/manifests/${VER}" \
            | tr -d '\r' | awk -F': ' 'tolower($1)=="docker-content-digest"{print $2}')
          if [ -z "$DIGEST" ]; then echo "::error::Could not resolve digest for ${VER}"; exit 1; fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "ref=ghcr.io/${REPO}:${VER}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Latest ${VER} -> ${DIGEST}"

      - name: Update compose + manifest if changed
        run: |
          set -euo pipefail
          VER='${{ steps.img.outputs.version }}'
          REF='${{ steps.img.outputs.ref }}'
          # Pin every nworth image line (web + feed) to the digest-qualified ref.
          sed -i "s|image: ghcr.io/zot24/nworth:.*|image: ${REF}|" zot24-nworth/docker-compose.yml
          # Bump the app version + VERSION via targeted regex (preserves comments/format).
          python3 - "$VER" <<'PY'
          import sys, re
          ver = sys.argv[1]
          p = 'zot24-nworth/umbrel-app.yml'
          s = open(p).read()
          s = re.sub(r'(?m)^version:.*$', f'version: "{ver}"', s, count=1)
          open(p, 'w').write(s)
          open('zot24-nworth/VERSION', 'w').write(ver + "\n")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zot24-nworth/docker-compose.yml zot24-nworth/umbrel-app.yml zot24-nworth/VERSION
          if git diff --cached --quiet; then
            echo "Already pinned to ${{ steps.img.outputs.version }} — nothing to do."
          else
            git commit -m "chore: pin nworth image to ${{ steps.img.outputs.version }}"
            git pull --rebase origin main && git push
          fi
