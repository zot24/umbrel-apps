name: "Build: Herdr"

# Builds + pushes ghcr.io/zot24/herdr-umbrel for both linux/amd64 and
# linux/arm64, then commits the new image+digest back into the app's
# docker-compose.yml so the manifest stays pinned to a deterministic image
# (Umbrel rejects unpinned images at install time).
#
# Mirrors build-playwright-renderer.yml. Decoupled because the apps version
# independently.

on:
  push:
    branches: [main]
    paths:
      - 'zot24-herdr/server/Dockerfile'
      - 'zot24-herdr/server/entrypoint.sh'
      - 'zot24-herdr/server/agent-bridge.mjs'
      - 'zot24-herdr/server/bootstrap-agents.sh'
      - '.github/workflows/build-herdr.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. 0.7.5). Leave empty to read umbrel-app.yml.'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(grep -E '^version: ' zot24-herdr/umbrel-app.yml | sed -E 's/^version: *"([^"]+)".*/\1/')
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi

          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: zot24-herdr/server
          file: zot24-herdr/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/zot24/herdr-umbrel:${{ steps.version.outputs.version }}
            ghcr.io/zot24/herdr-umbrel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update docker-compose.yml with new image + digest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # docker/build-push-action's outputs.digest is unreliable for
          # multi-arch builds: it can return the local image digest of one
          # platform rather than the manifest-list digest pushed to the
          # registry. `docker pull` resolves tags via the manifest list, so
          # if we pin to the local digest a fresh install fails to find it.
          # Query the registry directly for the canonical manifest digest.
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/zot24/herdr-umbrel:${VERSION}" --format '{{ .Manifest.Digest }}')
          if [ -z "$DIGEST" ]; then
            echo "::error::Could not determine manifest digest from registry"
            exit 1
          fi
          echo "Manifest digest: $DIGEST"
          sed -i "s|image: ghcr.io/zot24/herdr-umbrel:.*|image: ghcr.io/zot24/herdr-umbrel:${VERSION}@${DIGEST}|" zot24-herdr/docker-compose.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zot24-herdr/docker-compose.yml
          git diff --cached --quiet || git commit -m "chore: update herdr-umbrel image to ${{ steps.version.outputs.version }}"
          # Retry with rebase in case remote moved during the build
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
