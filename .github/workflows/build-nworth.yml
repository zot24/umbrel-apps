name: "Build: nworth"

# Builds + pushes ghcr.io/zot24/nworth for both linux/amd64 and linux/arm64,
# then commits the new image+digest back into zot24-nworth/docker-compose.yml
# so the manifest stays pinned to a deterministic image (Umbrel rejects
# unpinned images at install time).
#
# nworth source lives in the PRIVATE repo zot24/nworth, so this workflow checks
# it out with a fine-grained PAT stored as the NWORTH_REPO_TOKEN secret
# (Contents: read on zot24/nworth). The version is read from
# zot24-nworth/umbrel-app.yml and used as the git tag to build (v<version>).
#
# Mirrors build-playwright-renderer.yml; decoupled because the apps version
# independently. arm64 is built under QEMU emulation — the first build is slow
# (Rust compile), later builds reuse the GHA cache.

# Not push-triggered: nworth's source lives in the separate private repo, so
# there's nothing local to watch, and triggering on the manifest/compose would
# self-retrigger on this workflow's own digest/version commits. Instead it's
# run manually (workflow_dispatch) or by watch-nworth.yml (workflow_call), which
# builds first and bumps the version only on success.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.3.0). Leave empty to read umbrel-app.yml.'
        required: false
        default: ''
        type: string
      ref:
        description: 'nworth git ref to build. Leave empty to use v<version>.'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      version:
        required: false
        default: ''
        type: string
      ref:
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(grep -E '^version: ' zot24-nworth/umbrel-app.yml | sed -E 's/^version: *"([^"]+)".*/\1/')
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi

          REF="${{ inputs.ref }}"
          if [ -z "$REF" ]; then
            REF="v${VERSION}"
          fi

          echo "Version: $VERSION (nworth ref: $REF)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Checkout nworth source (private)
        uses: actions/checkout@v4
        with:
          repository: zot24/nworth
          ref: ${{ steps.version.outputs.ref }}
          token: ${{ secrets.NWORTH_REPO_TOKEN }}
          path: nworth-src

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: nworth-src
          file: nworth-src/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/zot24/nworth:${{ steps.version.outputs.version }}
            ghcr.io/zot24/nworth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update docker-compose.yml with new image + digest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # docker/build-push-action's outputs.digest is unreliable for
          # multi-arch builds: it can return the local image digest of one
          # platform rather than the manifest-list digest pushed to the
          # registry. `docker pull` resolves tags via the manifest list, so
          # if we pin to the local digest a fresh install fails to find it.
          # Query the registry directly for the canonical manifest digest.
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/zot24/nworth:${VERSION}" --format '{{ .Manifest.Digest }}')
          if [ -z "$DIGEST" ]; then
            echo "::error::Could not determine manifest digest from registry"
            exit 1
          fi
          echo "Manifest digest: $DIGEST"
          # Pins every nworth image line (web + feed) to the same digest.
          sed -i "s|image: ghcr.io/zot24/nworth:.*|image: ghcr.io/zot24/nworth:${VERSION}@${DIGEST}|" zot24-nworth/docker-compose.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zot24-nworth/docker-compose.yml
          git diff --cached --quiet || git commit -m "chore: update nworth image to ${{ steps.version.outputs.version }}"
          # Retry with rebase in case remote moved during the build
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
