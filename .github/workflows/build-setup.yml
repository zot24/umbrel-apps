name: "Build: Setup Wizard & Dashboard"

on:
  push:
    branches: [main]
    paths:
      - 'zot24-hermes/setup/server.js'
      - 'zot24-hermes/setup/wizard.html'
      - 'zot24-hermes/setup/status.html'
      - 'zot24-hermes/setup/Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine next version
        id: version
        run: |
          # Extract current setup image version from docker-compose.yml
          CURRENT=$(grep -oP 'ghcr.io/zot24/hermes-setup:\Kv[0-9]+\.[0-9]+\.[0-9]+' zot24-hermes/docker-compose.yml || echo "v0.0.0")
          echo "Current version: $CURRENT"

          # Bump patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT#v}"
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Next version: $NEXT"
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: zot24-hermes/setup
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/zot24/hermes-setup:${{ steps.version.outputs.next }}
            ghcr.io/zot24/hermes-setup:latest

      - name: Update docker-compose.yml with new image + digest
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          DIGEST="${{ steps.build.outputs.digest }}"
          sed -i "s|image: ghcr.io/zot24/hermes-setup:.*|image: ghcr.io/zot24/hermes-setup:${VERSION}@${DIGEST}|" zot24-hermes/docker-compose.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zot24-hermes/docker-compose.yml
          git diff --cached --quiet || git commit -m "chore: update setup image to ${{ steps.version.outputs.next }}"
          # Retry with rebase in case remote moved during the build
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done

      # Bump umbrel-app.yml version so Umbrel shows "Update available" for installs.
      # Separate commit + retry loop so a parallel build-web bump doesn't conflict.
      - name: Bump umbrel-app version (patch)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SUCCESS=0
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            CURRENT=$(grep -E '^version: ' zot24-hermes/umbrel-app.yml | sed -E 's/^version: *"([^"]+)".*/\1/')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
            sed -i "s|^version: \".*\"|version: \"$NEW\"|" zot24-hermes/umbrel-app.yml
            # Keep APP_VERSION in docker-compose.yml in sync — the setup UI reads it.
            sed -i "s|APP_VERSION: v.*|APP_VERSION: v$NEW|" zot24-hermes/docker-compose.yml
            git add zot24-hermes/umbrel-app.yml zot24-hermes/docker-compose.yml
            if git diff --cached --quiet; then
              echo "Nothing to bump (manifest already at latest)"
              SUCCESS=1
              break
            fi
            git commit -m "chore: bump umbrel-app version to $NEW"
            if git push; then
              echo "Bumped to $NEW"
              SUCCESS=1
              break
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
          if [ "$SUCCESS" = "0" ]; then
            echo "::warning::Version bump did not land after 5 attempts. Bump umbrel-app.yml manually."
          fi
