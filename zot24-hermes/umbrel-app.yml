tagline: Self-improving AI agent with Telegram & WhatsApp
description: 'Hermes Agent by Nous Research is a self-improving AI assistant that connects to your favorite messaging platforms. Run your own AI-powered agent on Umbrel and chat with it through Telegram, WhatsApp, Discord, or other platforms.


  Features:

  - Multi-Platform: Telegram, WhatsApp, Discord, Slack, Signal, Email, and more

  - 400+ Models: OpenRouter, Anthropic, OpenAI, DeepSeek, Kimi, MiniMax, Hugging Face, GitHub Copilot, Ollama, or any OpenAI-compatible endpoint (llama.cpp, LM Studio, vLLM)

  - Tool Use: Web browsing, code execution, file management, browser automation

  - Memory: Persistent memory with full-text search across conversations

  - Skills: Self-improving with autonomous skill creation, custom plugins, and MCP server integration

  - Automation: Scheduled tasks, cron jobs, webhooks, and parallel subagent spawning

  - Privacy: All data stays on your Umbrel, no cloud required

  - Backup: Export and import your agent state for easy migration


  Setup Instructions:

  1. Get an API key from your preferred LLM provider (or use a local model)

  2. Create a Telegram bot via @BotFather and copy the token

  3. Enter your credentials in the setup wizard (or import an existing backup)

  4. Start chatting with your agent!'
releaseNotes: "**The Judgment Release.** Over the last week and a half the team put nearly all of its effort into one goal: resolve **every P0 and P1 issue and PR in the entire Hermes Agent repo** \u2014 and as of this release, **100% of them are closed.** Zero open P0s. Zero open P1s. That's **~700 highest-priority items** cleared as part of **~1,950 total issues and PRs closed** this window. We intend to keep P0/P1 at zero from here on."
