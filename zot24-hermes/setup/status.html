<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0A0B;
      --surface: #151518;
      --surface-2: #1C1C21;
      --border: #2A2A30;
      --border-light: #38383F;
      --text: #EDEDEF;
      --text-muted: #8E8E93;
      --text-dim: #636366;
      --accent: #7C6CFF;
      --accent-glow: rgba(124, 108, 255, 0.15);
      --accent-hover: #6B5CE0;
      --success: #34C759;
      --success-bg: rgba(52, 199, 89, 0.1);
      --error: #FF453A;
      --error-bg: rgba(255, 69, 58, 0.1);
      --warning: #FF9F0A;
      --warning-bg: rgba(255, 159, 10, 0.1);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 480px; width: 100%; }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
      padding-top: 8px;
    }

    .header-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7C6CFF 0%, #A78BFA 50%, #C4B5FD 100%);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 24px rgba(124, 108, 255, 0.25);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }
    .status-pill.running { background: var(--success-bg); color: var(--success); }
    .status-pill.stopped { background: var(--error-bg); color: var(--error); }
    .status-pill.starting { background: var(--warning-bg); color: var(--warning); }

    .status-pill .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .status-pill.running .dot {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }

    .card-header {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    /* ── Platform list ── */
    .platform-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .platform-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .platform-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
    }

    .platform-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .platform-icon.telegram { background: rgba(0, 136, 204, 0.15); }
    .platform-icon.whatsapp { background: rgba(37, 211, 102, 0.15); }
    .platform-icon.discord { background: rgba(88, 101, 242, 0.15); }
    .platform-icon.slack { background: rgba(74, 21, 75, 0.15); }

    .platform-status {
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .platform-status .indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .platform-status.connected { color: var(--success); }
    .platform-status.disconnected { color: var(--error); }
    .platform-status.pending { color: var(--warning); }

    /* ── QR Section ── */
    .qr-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .qr-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
    }

    .qr-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .qr-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .qr-frame {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.3);
      margin-bottom: 24px;
    }

    .qr-frame img {
      display: block;
      width: 240px;
      height: 240px;
      border-radius: 4px;
    }

    .qr-steps {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 300px;
    }

    .qr-step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .qr-step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      flex-shrink: 0;
    }

    /* ── Config rows ── */
    .config-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }
    .config-row + .config-row {
      border-top: 1px solid var(--border);
    }
    .config-label { font-size: 13px; color: var(--text-muted); }
    .config-value { font-size: 13px; font-weight: 500; }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      flex: 1;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); border-color: var(--border-light); }

    /* ── Spinner ── */
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">&#9877;</div>
      <h1>Hermes Agent</h1>
      <div id="gatewayStatus">
        <span class="status-pill starting"><span class="dot"></span> Loading...</span>
      </div>
    </div>

    <!-- Platforms -->
    <div class="card">
      <div class="card-header">Platforms</div>
      <div class="platform-list" id="platformList">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

    <!-- WhatsApp QR (shown when needed) -->
    <div class="qr-card" id="waQrSection" style="display:none;"></div>

    <!-- Config -->
    <div class="card">
      <div class="card-header">Configuration</div>
      <div class="config-row">
        <span class="config-label">Model</span>
        <span class="config-value" id="configModel">...</span>
      </div>
      <div class="config-row">
        <span class="config-label">Provider</span>
        <span class="config-value" id="configProvider">...</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-secondary" onclick="window.location.href='/setup'">Reconfigure</button>
      <button class="btn btn-primary" id="restartBtn" onclick="restartGateway()">Restart Gateway</button>
    </div>
  </div>

  <script>
    let lastQrImage = null;

    const platformIcons = {
      "Telegram": { icon: "\u{1F4E8}", cls: "telegram" },
      "WhatsApp": { icon: "\u{1F4AC}", cls: "whatsapp" },
      "Discord":  { icon: "\u{1F3AE}", cls: "discord" },
      "Slack":    { icon: "\u{1F4BC}", cls: "slack" },
    };

    async function fetchStatus() {
      try {
        const data = await (await fetch("/api/status")).json();
        updateUI(data);
      } catch (e) {
        console.error("Status fetch failed:", e);
      }
    }

    function updateUI(data) {
      const gwState = data.gateway?.gateway_state || "unknown";
      const statusEl = document.getElementById("gatewayStatus");

      let cls, txt;
      if (gwState === "running") { cls = "running"; txt = "Running"; }
      else if (gwState === "starting") { cls = "starting"; txt = "Starting..."; }
      else { cls = "stopped"; txt = gwState === "unknown" ? "Waiting..." : "Stopped"; }

      statusEl.innerHTML = `<span class="status-pill ${cls}"><span class="dot"></span> ${txt}</span>`;

      // Platforms
      const listEl = document.getElementById("platformList");
      if (!data.platforms?.length) {
        listEl.innerHTML = '<div class="empty-state">No platforms configured</div>';
        document.getElementById("waQrSection").style.display = "none";
        return;
      }

      listEl.innerHTML = data.platforms.map(p => {
        const pi = platformIcons[p.name] || { icon: "\u{1F310}", cls: "" };
        let sc, st;

        if (p.name === "WhatsApp") {
          if (p.paired) { sc = "connected"; st = "Connected"; }
          else if (p.hasQr) { sc = "pending"; st = "Scan QR below"; }
          else { sc = "pending"; st = "Waiting for QR..."; }
        } else {
          const pg = data.gateway?.platforms?.[p.name.toLowerCase()];
          if (pg?.error_message) { sc = "disconnected"; st = "Error"; }
          else if (gwState === "running") { sc = "connected"; st = "Connected"; }
          else { sc = "pending"; st = "Connecting..."; }
        }

        return `<div class="platform-item">
          <div class="platform-name">
            <div class="platform-icon ${pi.cls}">${pi.icon}</div>
            ${p.name}
          </div>
          <div class="platform-status ${sc}">
            <span class="indicator"></span>
            ${st}
          </div>
        </div>`;
      }).join("");

      // WhatsApp QR
      const wa = data.platforms.find(p => p.name === "WhatsApp" && !p.paired);
      if (wa) { fetchWhatsAppQR(); } else {
        document.getElementById("waQrSection").style.display = "none";
        lastQrImage = null;
      }

      // Config
      document.getElementById("configModel").textContent = data.model || "Not set";
      document.getElementById("configProvider").textContent = data.provider || "auto";
    }

    async function fetchWhatsAppQR() {
      const section = document.getElementById("waQrSection");
      try {
        const data = await (await fetch("/api/whatsapp-qr")).json();

        if (data.status === "paired") {
          section.style.display = "none";
          lastQrImage = null;
          return;
        }

        section.style.display = "block";

        if (data.qrImage && data.qrImage !== lastQrImage) {
          lastQrImage = data.qrImage;
          section.innerHTML = `
            <div class="qr-content">
              <div class="qr-title">Link WhatsApp</div>
              <div class="qr-subtitle">Scan this QR code to connect</div>
              <div class="qr-frame">
                <img src="${data.qrImage}" alt="WhatsApp QR Code">
              </div>
              <div class="qr-steps">
                <div class="qr-step">
                  <span class="qr-step-num">1</span>
                  Open WhatsApp on your phone
                </div>
                <div class="qr-step">
                  <span class="qr-step-num">2</span>
                  Tap Settings &gt; Linked Devices
                </div>
                <div class="qr-step">
                  <span class="qr-step-num">3</span>
                  Tap "Link a Device" and scan
                </div>
              </div>
            </div>
          `;
        } else if (!data.qrImage && !lastQrImage) {
          section.innerHTML = `
            <div class="qr-content">
              <div class="spinner"></div>
              <div class="qr-subtitle">${data.message || "Generating QR code..."}</div>
            </div>
          `;
        }
      } catch (e) {
        console.error("QR fetch failed:", e);
      }
    }

    async function restartGateway() {
      const btn = document.getElementById("restartBtn");
      btn.disabled = true; btn.textContent = "Restarting...";
      try { await fetch("/api/restart", { method: "POST" }); } catch(e) { alert("Failed: " + e.message); }
      setTimeout(fetchStatus, 3000);
      setTimeout(() => { btn.disabled = false; btn.textContent = "Restart Gateway"; }, 5000);
    }

    fetchStatus();
    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
