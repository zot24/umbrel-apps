services:
  app_proxy:
    environment:
      APP_HOST: zot24-hermes_setup_1
      APP_PORT: 8080

  setup:
    image: ghcr.io/zot24/hermes-setup:v0.0.3@sha256:bccb07298e4ddcf6002f196bff338f51becb61bde99c549df667179f19e21adf
    restart: on-failure
    # Security hardening: minimize blast radius of Docker socket access
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Needed to write config files on the shared volume owned by node (UID 1000)
      - DAC_OVERRIDE
      - FOWNER
    tmpfs:
      - /tmp
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONFIG_DIR: /config
      WEB_CONTAINER: zot24-hermes_web_1

  web:
    image: ghcr.io/zot24/hermes-docker:v2026.3.23@sha256:00f61b2e00ba3383792b12034d0301bc6f842068ccd9ec8871a8addb9571a724
    # TODO: remove user override once image handles permissions via sudo (openclaw pattern)
    user: root
    restart: on-failure
    init: true
    stop_grace_period: 1m
    depends_on:
      - setup
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/data/linuxbrew:/home/linuxbrew
    env_file:
      - path: ${APP_DATA_DIR}/data/.env
        required: false
    environment:
      HOME: /data
      HERMES_HOME: /data/.hermes
    healthcheck:
      test: ["CMD", "python3", "-c", "import json,sys; d=json.load(open('/data/.hermes/gateway_state.json')); sys.exit(0 if d.get('gateway_state')=='running' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
