services:
  app_proxy:
    environment:
      APP_HOST: zot24-hermes_setup_1
      APP_PORT: 8080

  setup:
    image: ghcr.io/zot24/hermes-setup:v0.0.25@sha256:537e6bea5e87564d584f4572055b02466bc57d5946fff8e566c9d74e08b3f6b3
    restart: on-failure
    # Security hardening: minimize blast radius of Docker socket access
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Needed to write config files on the shared volume owned by node (UID 1000)
      - DAC_OVERRIDE
      - FOWNER
    tmpfs:
      - /tmp
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONFIG_DIR: /config
      WEB_HERMES_HOME: /data/.hermes
      WEB_CONTAINER: zot24-hermes_web_1
      APP_VERSION: v0.11.0

  web:
    image: ghcr.io/zot24/hermes-docker:v2026.4.30@sha256:7f3d1fdd1ac2ac1701745fe3928f6d80d912fcb63a35ab53a0c8c7c2b8b296f2
    # Runs as hermes user (UID 1000) — entrypoint uses sudo chown for volume permissions
    restart: on-failure
    init: true
    stop_grace_period: 1m
    depends_on:
      - setup
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/data/linuxbrew:/home/linuxbrew
    env_file:
      - path: ${APP_DATA_DIR}/data/.env
        required: false
    environment:
      HOME: /data
      HERMES_HOME: /data/.hermes
    healthcheck:
      test: ["CMD", "python3", "-c", "import json,sys; d=json.load(open('/data/.hermes/gateway_state.json')); sys.exit(0 if d.get('gateway_state')=='running' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
