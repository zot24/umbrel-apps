services:
  app_proxy:
    environment:
      APP_HOST: zot24-hermes_setup_1
      APP_PORT: 8080

  setup:
    image: ghcr.io/zot24/hermes-setup:v0.0.12@sha256:eed7b67c0287cf577e7cdcaf03004a1445cdb874d188af70ff3204157b6eeb68
    restart: on-failure
    # Security hardening: minimize blast radius of Docker socket access
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Needed to write config files on the shared volume owned by node (UID 1000)
      - DAC_OVERRIDE
      - FOWNER
    tmpfs:
      - /tmp
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONFIG_DIR: /config
      WEB_CONTAINER: zot24-hermes_web_1
      APP_VERSION: v0.5.0

  web:
    image: ghcr.io/zot24/hermes-docker:v2026.3.28@sha256:72760940aa73df5ea7cba1d64f2c245224b9e6d86640d5373a3a0b484afb2bf7
    # Runs as hermes user (UID 1000) — entrypoint uses sudo chown for volume permissions
    restart: on-failure
    init: true
    stop_grace_period: 1m
    depends_on:
      - setup
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/data/linuxbrew:/home/linuxbrew
    env_file:
      - path: ${APP_DATA_DIR}/data/.env
        required: false
    environment:
      HOME: /data
      HERMES_HOME: /data/.hermes
    healthcheck:
      test: ["CMD", "python3", "-c", "import json,sys; d=json.load(open('/data/.hermes/gateway_state.json')); sys.exit(0 if d.get('gateway_state')=='running' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
