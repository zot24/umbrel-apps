services:
  setup:
    build: ./setup
    ports:
      - "8080:8080"
    volumes:
      - ./local-data:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONFIG_DIR: /config
      WEB_CONTAINER: zot24-hermes-web-1

  web:
    build: ./web
    volumes:
      - ./local-data:/data
      - ./local-data/linuxbrew:/home/linuxbrew
    env_file:
      - path: ./local-data/.env
        required: false
    environment:
      HOME: /data
      HERMES_HOME: /data/.hermes
