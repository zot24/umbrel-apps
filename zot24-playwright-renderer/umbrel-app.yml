category: developer
version: "0.2.0"
tagline: Self-hosted headless-browser renderer with residential-IP egress
description: >-
  Playwright Renderer is a project-agnostic self-hosted headless-browser
  service. It exposes a small HTTP API that fetches any URL, renders it with
  Chromium, and returns the resulting HTML — all from your home Internet
  connection. Pair it with a Cloudflare Tunnel and your scrapers and
  automations get a real residential IP fingerprint without leaving your Umbrel.


  Features:

  - HTTP API: POST /render with a URL, get back fully rendered HTML, the final
    URL after redirects, and the response status.

  - Bearer-token auth: every request must carry a shared secret you control.

  - Self-hosted on your hardware: traffic exits via your home ISP, giving
    requests a residential IP fingerprint that sidesteps datacenter-IP rate
    limits and bot detection.

  - Pairs with the standalone Cloudflared Umbrel app — declared as a
    dependency so installing this app installs the tunnel daemon too, and a
    single cloudflared instance can serve every home-tunnel app on the box.

  - Drop-in compatible: response shape mirrors Cloudflare Browser Rendering's
    /content endpoint so clients can swap backends without code changes.

  - Logged-in scraping (opt-in): set `useSession: true` in your /render request
    and the server applies a persisted browser session from
    /data/storageState.json. Install one with the bundled
    tools/cookies-to-storage-state.mjs script — see STORAGESTATE.md for
    the full ritual. Required for any site that anti-bot-walls anonymous
    Playwright (Instagram, LinkedIn, etc.).

  - Stealth patches: every context auto-applies the standard "this isn't
    Playwright" page-side masks (navigator.webdriver, plugins, languages,
    window.chrome). Pairs with the launch arg
    --disable-blink-features=AutomationControlled so the headless
    fingerprint is muted without pulling in playwright-extra.


  Setup Instructions:

  1. Install the Cloudflared Umbrel app and configure your tunnel + tunnel
     token there. (This app declares cloudflared as a dependency, so Umbrel
     will prompt for it on install if it's not present.)

  2. In the Cloudflare Zero Trust dashboard, add a public hostname to your
     tunnel pointing at http://zot24-playwright-renderer_playwright_1:3030.

  3. Install Playwright Renderer. The server auto-generates a bearer token
     on first boot and persists it to /data/.env on the app's Docker volume.

  4. Open the app's Logs view in the Umbrel dashboard and copy the
     "RENDERER_TOKEN=..." banner the server prints on first start.

  5. Test with: curl -X POST https://playwright.<your-domain>/render
     -H "Authorization: Bearer <token>" -d '{"url":"https://example.com"}'
releaseNotes: >-
  Adds opt-in logged-in scraping via persisted browser sessions: pass
  "useSession": true on /render and the server bootstraps the context from
  /data/storageState.json. Install one with the bundled
  tools/cookies-to-storage-state.mjs (Netscape cookies.txt → Playwright
  storageState format, zero deps). When useSession is true but no file is
  installed the server returns 503 with a clear message, so misconfiguration
  fails loud instead of silently downgrading to anonymous. Required for
  Instagram and other anti-bot-walled sites. Every context now also applies
  baseline stealth patches (navigator.webdriver / plugins / languages /
  window.chrome) and chromium launches with
  --disable-blink-features=AutomationControlled — applied uniformly whether
  or not the session opt-in is used. Full operator runbook in
  STORAGESTATE.md.
