version: "0.3.0"
tagline: Self-hosted headless-browser renderer with residential-IP egress
description: >-
  Playwright Renderer is a project-agnostic self-hosted headless-browser
  service. It exposes a small HTTP API that fetches any URL, renders it with
  Chromium, and returns the resulting HTML — all from your home Internet
  connection. Pair it with a Cloudflare Tunnel and your scrapers and
  automations get a real residential IP fingerprint without leaving your Umbrel.


  Features:

  - HTTP API: POST /render with a URL, get back fully rendered HTML, the final
    URL after redirects, and the response status.

  - Bearer-token auth: every request must carry a shared secret you control.

  - Self-hosted on your hardware: traffic exits via your home ISP, giving
    requests a residential IP fingerprint that sidesteps datacenter-IP rate
    limits and bot detection.

  - Pairs with the standalone Cloudflared Umbrel app — declared as a
    dependency so installing this app installs the tunnel daemon too, and a
    single cloudflared instance can serve every home-tunnel app on the box.

  - Drop-in compatible: response shape mirrors Cloudflare Browser Rendering's
    /content endpoint so clients can swap backends without code changes.

  - Logged-in scraping (opt-in): set `useSession: true` in your /render request
    and the server applies a persisted browser session from
    /data/storageState.json. Install one with the bundled
    tools/cookies-to-storage-state.mjs script — see STORAGESTATE.md for
    the full ritual. Required for any site that anti-bot-walls anonymous
    Playwright (Instagram, LinkedIn, etc.).

  - Session keep-alive (on by default): after every successful sessioned
    render the refreshed cookies are written back to /data/storageState.json,
    so sliding-expiry sessions keep extending themselves. Opt out with
    SESSION_KEEPALIVE=false in /data/.env.

  - Instagram session auto-refresh (opt-in): when the persisted session
    expires and Instagram serves a login wall, the renderer can re-login by
    itself using credentials you provision in /data/.env (IG_USERNAME,
    IG_PASSWORD, optional IG_TOTP_SECRET — TOTP computed in-process, RFC
    6238), save a fresh session, and retry the render. Heavily guarded:
    disabled unless STORAGE_STATE_AUTOREFRESH=true, at most one attempt
    per 6 hours, fail-stop after 3 consecutive failures with a loud log
    alert, and credentials never appear in logs. See STORAGESTATE.md for
    the provisioning runbook and the security tradeoff before enabling.

  - Stealth patches: every context auto-applies the standard "this isn't
    Playwright" page-side masks (navigator.webdriver, plugins, languages,
    window.chrome). Pairs with the launch arg
    --disable-blink-features=AutomationControlled so the headless
    fingerprint is muted without pulling in playwright-extra.


  Setup Instructions:

  1. Install the Cloudflared Umbrel app and configure your tunnel + tunnel
     token there. (This app declares cloudflared as a dependency, so Umbrel
     will prompt for it on install if it's not present.)

  2. In the Cloudflare Zero Trust dashboard, add a public hostname to your
     tunnel pointing at http://zot24-playwright-renderer_playwright_1:3030.

  3. Install Playwright Renderer. The server auto-generates a bearer token
     on first boot and persists it to /data/.env on the app's Docker volume.

  4. Open the app's Logs view in the Umbrel dashboard and copy the
     "RENDERER_TOKEN=..." banner the server prints on first start.

  5. Test with: curl -X POST https://playwright.<your-domain>/render
     -H "Authorization: Bearer <token>" -d '{"url":"https://example.com"}'
releaseNotes: >-
  Session auto-refresh, two layers.


  Keep-alive (on by default, opt out with SESSION_KEEPALIVE=false): after
  every successful `useSession: true` render that is not a login wall, the
  context's cookies are written back to /data/storageState.json (atomic,
  mode 600). Sliding-expiry sessions now extend themselves on every scrape,
  postponing the manual cookie-export ritual indefinitely in the happy case.
  Never written when the response carries login-wall markers, so an expired
  session can't clobber good state with logged-out cookies.


  Instagram auto-login (opt-in, STORAGE_STATE_AUTOREFRESH=true): when a
  sessioned render comes back as Instagram's login wall, the renderer
  re-logins with operator-provisioned credentials from /data/.env
  (IG_USERNAME, IG_PASSWORD, optional IG_TOTP_SECRET — RFC 6238 TOTP
  computed in pure node:crypto, no new dependencies), verifies via the
  sessionid cookie, persists the fresh session, and retries the original
  render once. Guardrails: minimum 6h between attempts
  (AUTOLOGIN_MIN_INTERVAL_HOURS), fail-stop after 3 consecutive failures
  (AUTOLOGIN_MAX_CONSECUTIVE_FAILURES) with a loud alert pointing at
  STORAGESTATE.md, single-flight, and credentials/TOTP codes/cookies never
  logged at any level. On any recovery failure the wall HTML is served
  unchanged as a success response so scraper workers can detect the expired
  session and back off. Credentials are re-read from /data/.env on every
  attempt — provision over ssh, no restart needed. See STORAGESTATE.md for
  the runbook and the security tradeoff (TOTP secret next to the password
  is effectively no 2FA; use a dedicated scraping account).
