services:
  app_proxy:
    environment:
      APP_HOST: zot24-playwright-renderer_playwright_1
      APP_PORT: 3030

  playwright:
    # Image + digest are populated by .github/workflows/build-playwright-renderer.yml
    # on every push that touches playwright-server/. Umbrel rejects unpinned
    # images at install time, so the workflow's commit-back step is what makes
    # this app actually installable.
    image: ghcr.io/zot24/playwright-renderer:0.1.0@sha256:02fb45cd29f7db81c947d09c540e92dc6a71a8b4baeb1b97d78cd9e18608ac35
    restart: on-failure
    init: true
    stop_grace_period: 30s
    environment:
      RENDERER_TOKEN: ${RENDERER_TOKEN}
      NODE_ENV: production
    volumes:
      - ${APP_DATA_DIR}/data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3030/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
